<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShareAuto — Shared Auto-Rickshaw Booking</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- FontAwesome for UI Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Leaflet Map CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  
  <!-- App Core CSS -->
  <link rel="stylesheet" href="/css/global.css?v=2">
  <link rel="stylesheet" href="/css/auth.css?v=2">
  <link rel="stylesheet" href="/css/passenger.css?v=2">
  <link rel="stylesheet" href="/css/driver.css?v=2">
  <link rel="stylesheet" href="/css/admin.css?v=2">
</head>
<body>
  <!-- Toast Notifications Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Main SPA Mounting Point -->
  <div id="app">
    <!-- View content is injected here dynamically -->
    <div class="loader-container">
      <div class="spinner"></div>
      <p>Loading ShareAuto...</p>
    </div>
  </div>

  <!-- Leaflet Map JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- Core Scripts -->
  <script src="/js/api.js?v=2"></script>
  <script src="/js/websocket.js?v=2"></script>
  <script src="/js/map.js?v=2"></script>

  <!-- View Components -->
  <script src="/js/auth.js?v=2"></script>
  <script src="/js/passenger.js?v=2"></script>
  <script src="/js/driver.js?v=2"></script>

  <!-- App Router & Controller (Entry Point) -->
  <script src="/js/app.js?v=2"></script>
</body>
</html>
